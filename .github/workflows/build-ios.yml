name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ios:
    name: Build iOS (Device IPA)
    runs-on: macos-15
    permissions:
      contents: write
    env:
      APP_VARIANT: production
      NODE_OPTIONS: --max-old-space-size=8192
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: List available Xcode versions
        run: |
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode found"
          xcodebuild -version

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST/Contents/Developer"
            echo "Selected: $LATEST"
            xcodebuild -version
          fi

      - name: Check Swift version
        run: swift --version

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Enable corepack
        run: corepack enable

      - name: Install pnpm
        run: |
          pnpm_version="$(node --print "require('./package.json').packageManager.split('@').pop()")"
          corepack prepare "pnpm@$pnpm_version" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Prebuild iOS
        working-directory: apps/mobile
        run: npx expo prebuild --clean --platform ios

      - name: Build iOS (Device)
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace T3Code.xcworkspace \
            -scheme T3Code \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            2>&1 | tee build.log

          EXIT_CODE=${PIPESTATUS[0]}
          echo "xcodebuild exit code: $EXIT_CODE"

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "=== BUILD ERRORS ==="
            grep -E "error:" build.log | grep -v "warning:" | tail -30
            echo ""
            echo "=== LAST 50 LINES ==="
            tail -50 build.log
            exit $EXIT_CODE
          fi

      - name: Package IPA
        working-directory: apps/mobile
        run: |
          APP_PATH=$(find ios/build -name "T3Code.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "T3Code.app not found"
            find ios/build -name "*.app" -type d 2>/dev/null || echo "no .app files"
            ls -la ios/build/
            exit 1
          fi

          echo "Found app: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r T3Code-device.ipa Payload/
          rm -rf Payload
          echo "IPA size: $(du -h T3Code-device.ipa | cut -f1)"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: T3Code-device
          path: apps/mobile/T3Code-device.ipa
          retention-days: 30
