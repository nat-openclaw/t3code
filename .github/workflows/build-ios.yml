name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ios:
    name: Build iOS (Simulator IPA)
    runs-on: macos-15
    permissions:
      contents: write
    env:
      APP_VARIANT: production
      NODE_OPTIONS: --max-old-space-size=8192
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.10.0 --activate

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS
        working-directory: apps/mobile
        run: |
          EXPO_NO_GIT_STATUS=1 expo prebuild --clean --platform ios

      - name: Build iOS (Simulator)
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace T3Code.xcworkspace \
            -scheme T3Code \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tail -20

      - name: Package IPA
        working-directory: apps/mobile
        run: |
          # Find the built .app
          APP_PATH=$(find ios/build -name "T3Code.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "T3Code.app not found, listing build directory:"
            find ios/build -name "*.app" -type d
            exit 1
          fi

          # Create IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r T3Code-simulator.ipa Payload/
          rm -rf Payload

          echo "IPA size: $(du -h T3Code-simulator.ipa | cut -f1)"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: T3Code-simulator
          path: apps/mobile/T3Code-simulator.ipa
          retention-days: 30
